<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OV Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 40px; font-family: 'Inter', sans-serif; 
            background: #09090b; color: white;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 12px; padding: 25px; margin-bottom: 25px;
        }
        h1, h2 { margin-top: 0; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        input, select { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px; border-radius: 8px; color: white; width: 100%; box-sizing: border-box;
            outline: none; margin-bottom: 10px; font-family: 'Inter', sans-serif;
        }
        option { background: #09090b; color: white; }

        .btn { 
            background: #fff; color: #000; padding: 10px 15px; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px;
        }
        .btn:hover { background: #e5e5e5; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { opacity: 0.5; font-weight: normal; }
        
        .badge { 
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;
            background: rgba(255,255,255,0.1);
        }
        .badge.active { background: rgba(0,255,100,0.2); color: #50ff80; }
        
        /* Простой свитч для техработ */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(26px); background-color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>Панель управления</h1>

    <div class="grid">
        <div class="card">
            <h2>Глобальные настройки</h2>
            
            <label style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <span>Технические работы (Блокировка лоадера)</span>
                <label class="switch">
                    <input type="checkbox" id="texAdminToggle" onchange="toggleTexAdmin()">
                    <span class="slider"></span>
                </label>
            </label>

            <label style="opacity: 0.6; font-size: 13px;">Прямая ссылка на обновление (Update.zip):</label>
            <input type="text" id="updateLink" placeholder="https://...">
            <button class="btn" onclick="saveUpdateLink()">Сохранить ссылку</button>
        </div>
    </div>

    <div class="card">
        <h2>Пользователи</h2>
        <table>
            <thead>
                <tr>
                    <th>Никнейм</th>
                    <th>ID (UID)</th>
                    <th>Текущая подписка</th>
                    <th>Управление подпиской</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ТОТ ЖЕ САМЫЙ КОНФИГ
    const firebaseConfig = {
        apiKey: "AIzaSyDeUzPDzlNOOjltElDOlPkYTwJVTiki_6s",
        authDomain: "secretme1.firebaseapp.com",
        databaseURL: "https://secretme1-default-rtdb.firebaseio.com",
        projectId: "secretme1",
        storageBucket: "secretme1.firebasestorage.app",
        messagingSenderId: "8350375438",
        appId: "1:8350375438:web:6b1af092ebcd2023bf265f"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // 1. Загрузка глобальных настроек
    db.ref('global').on('value', snap => {
        const data = snap.val() || {};
        document.getElementById('texAdminToggle').checked = data.texadmin === true;
        document.getElementById('updateLink').value = data.Update || "";
    });

    function toggleTexAdmin() {
        const isChecked = document.getElementById('texAdminToggle').checked;
        db.ref('global/texadmin').set(isChecked);
    }

    function saveUpdateLink() {
        const link = document.getElementById('updateLink').value;
        db.ref('global/Update').set(link);
        alert("Ссылка на обновление сохранена!");
    }

    // 2. Загрузка всех пользователей
    db.ref('users').on('value', snap => {
        const users = snap.val() || {};
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = "";

        for (const uid in users) {
            const user = users[uid];
            const sub = user.sub || 'Free';
            const isActive = sub !== 'Free';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: 600;">${user.username || 'Без ника'}</td>
                <td style="opacity: 0.5; font-family: monospace;">${uid}</td>
                <td><span class="badge ${isActive ? 'active' : ''}">${sub}</span></td>
                <td>
                    <select id="select-${uid}">
                        <option value="Free" ${sub === 'Free' ? 'selected' : ''}>Free (Снять подписку)</option>
                        <option value="1.21.4 30d" ${sub === '1.21.4 30d' ? 'selected' : ''}>1.21.4 30d</option>
                        <option value="1.21.4 90d" ${sub === '1.21.4 90d' ? 'selected' : ''}>1.21.4 90d</option>
                        <option value="1.21.4 LifeTime" ${sub === '1.21.4 LifeTime' ? 'selected' : ''}>1.21.4 LifeTime</option>
                    </select>
                </td>
                <td>
                    <button class="btn" style="padding: 6px 12px;" onclick="updateSub('${uid}')">Выдать</button>
                </td>
            `;
            tbody.appendChild(tr);
        }
    });

    // Функция обновления подписки конкретному юзеру
    function updateSub(uid) {
        const newSub = document.getElementById(`select-${uid}`).value;
        db.ref('users/' + uid + '/sub').set(newSub).then(() => {
            // Можно добавить небольшое уведомление, но таблица обновится сама (реактивность)
        });
    }
</script>

</body>
</html>
